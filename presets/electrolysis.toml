# kicad2print — Copper Electrolysis (Electroplating) Preset
#
# Use this preset when you will electroplate copper into the grooves using
# a conductive primer + copper sulfate electrolysis bath.
#
# Workflow overview:
#   1. Print the substrate (narrower grooves than wire mode — copper fills them).
#   2. Insert through-hole components.
#   3. Apply conductive primer or paint to all trace grooves.
#   4. Electroplate copper: connect board as cathode in CuSO4 bath, apply ~1–2 V.
#   5. Test traces with a multimeter.
#   6. Solder components.
#
# Usage:
#   kicad2print my_board.kicad_pcb --config presets/electrolysis.toml
# Or select via CLI flag (uses these values when not overridden by the TOML above):
#   kicad2print my_board.kicad_pcb --mode electrolysis

mode = "electrolysis"

# ============================================================================
# TRACE CHANNEL CONFIGURATION
# ============================================================================

# Narrower than wire mode — the groove defines the copper trace width.
# Copper is deposited into the groove rather than a wire being laid in it.
# Typical signal traces: 0.3–0.5 mm. Power traces: 0.5–1.0 mm.
channel_width_mm = 0.7

channel_depth_mm = 0.8

# ============================================================================
# VIA / EYELET CONFIGURATION
# ============================================================================

# Full holes are preferred for electrolysis — the conductive primer can coat
# the hole walls, and eyelets bridge the layers more reliably than indents.
eyelet_style = "hole"
eyelet_diameter_mm = 1.5

# ============================================================================
# COMPONENT PAD CONFIGURATION
# ============================================================================

pad_hole_diameter_mm = 0.8

# ============================================================================
# BOARD CONFIGURATION
# ============================================================================

# Slightly thicker substrate for rigidity during the electrolysis bath process.
substrate_thickness_mm = 2.2

# For electrolysis, 1:1 scale is typical — the groove width directly sets the
# trace width, so no scaling is needed. Set to 0 for auto-scale.
scale_factor = 0.0

# ============================================================================
# SNAP-ON PAINT STENCIL + TEMPORARY PLATING BUS
# ============================================================================
#
# Generates a separate snap-on stencil (one per copper side that has traces:
# <board>_stencil_top.stl / _stencil_bottom.stl) that registers over the
# substrate via a perimeter snap-lip.
#
#   - Through-slots over every trace groove let you squeegee conductive paint
#     only into the channels, then lift the stencil off — minimal cleanup.
#   - Extra slots form a temporary bus: a perimeter rail plus one stub to each
#     electrically-isolated trace, so the whole side plates from one cathode
#     contact. The bus bars sit proud on the flat substrate; grind them off
#     after plating to isolate the traces.
#
# Enabled by default in electrolysis mode.
generate_stencil = true

# Stencil plate thickness (also the deposited height of the grind-off bus bars).
stencil_thickness_mm = 0.5

# Extra width per side added to each trace slot (paint flow + print tolerance).
stencil_slot_clearance_mm = 0.1

# Perimeter snap-lip that wraps down over the board edge.
# wall_height only needs to be a shallow grip to keep the stencil located —
# it does not need to reach the full substrate thickness.
stencil_wall_height_mm = 1.2
stencil_wall_thickness_mm = 1.5

# Clearance between the snap-lip inner wall and the board edge.
# Smaller = tighter snap; tune to your printer (typ. 0.1–0.2 mm).
stencil_fit_clearance_mm = 0.15

# Temporary plating bus geometry.
bus_width_mm = 1.0   # width of the rail and the stubs
bus_inset_mm = 1.5   # how far the rail sits inside the board edge

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================

output_format = "stl"
output_dir = "./output"
