name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like and why it would be useful.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - STL / 3MF output
        - Assembly guide (HTML)
        - Copper wire mode
        - Electroplating mode
        - MCP server tools
        - CLI / configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do that isn't possible today?
      placeholder: "When I have boards with fine-pitch SMD pads, the groove width is too wide and the pads merge..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Rough ideas are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've tried.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, links to related tools, example boards, etc.
